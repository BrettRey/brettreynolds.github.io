<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Adversarial pragmatics adjudication</title>
<style>
:root {
  color-scheme: light;
  --ink: #172026;
  --muted: #617080;
  --line: #cbd5df;
  --panel: #f7f9fb;
  --paper: #ffffff;
  --accent: #0f766e;
  --accent-soft: #ccfbf1;
  --warn: #b45309;
  --bad: #b91c1c;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  color: var(--ink);
  background: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  line-height: 1.45;
}
main {
  max-width: 1180px;
  margin: 0 auto;
  padding: 22px;
}
h1, h2, h3 {
  margin: 0 0 10px;
  font-weight: 650;
  letter-spacing: 0;
}
h1 { font-size: 1.55rem; }
h2 { font-size: 1.08rem; margin-top: 20px; }
h3 { font-size: .98rem; margin-top: 14px; }
p { margin: 0 0 12px; }
button, input, textarea, select {
  font: inherit;
}
.muted { color: var(--muted); }
.small { font-size: .9rem; }
.topline {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
  margin-bottom: 14px;
}
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
}
.notice {
  border-left: 4px solid var(--warn);
  background: #fff7ed;
  padding: 10px 12px;
  margin: 14px 0;
}
.field {
  display: grid;
  gap: 7px;
  margin: 14px 0;
}
input[type="text"], textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
}
input[type="text"] { max-width: 380px; }
textarea {
  min-height: 96px;
  resize: vertical;
}
.bar {
  height: 8px;
  background: #e2e8f0;
  border-radius: 999px;
  overflow: hidden;
  margin: 8px 0 16px;
}
.bar > div {
  height: 100%;
  background: var(--accent);
}
.layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 340px;
  gap: 18px;
  align-items: start;
}
.box {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  background: var(--paper);
  margin-bottom: 14px;
}
.facts {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}
.fact {
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  padding: 8px;
  overflow-wrap: anywhere;
}
.fact strong {
  display: block;
  font-size: .78rem;
  color: var(--muted);
  font-weight: 650;
}
.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}
.prompt, .response, .expected {
  border: 1px solid #dbe2ea;
  border-radius: 7px;
  background: #fbfdff;
  padding: 12px;
  max-height: 240px;
  overflow: auto;
}
.response {
  background: #fff;
  max-height: 320px;
}
.expected {
  background: #f8fafc;
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chip {
  border: 1px solid #99f6e4;
  background: var(--accent-soft);
  color: #134e4a;
  border-radius: 999px;
  padding: 3px 8px;
  font-size: .82rem;
}
.chip.high { border-color: #fecaca; background: #fef2f2; color: #7f1d1d; }
.chip.medium { border-color: #fed7aa; background: #fff7ed; color: #7c2d12; }
.option-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}
.option {
  min-height: 68px;
  text-align: left;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  color: var(--ink);
  cursor: pointer;
  padding: 10px;
}
.option:hover {
  border-color: var(--accent);
}
.option.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
  box-shadow: inset 0 0 0 1px var(--accent);
}
.option b { display: block; margin-bottom: 3px; }
.segmented {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.segmented button {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 999px;
  padding: 8px 10px;
  cursor: pointer;
}
.segmented button.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.select-grid {
  display: grid;
  gap: 10px;
}
select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  padding: 9px 10px;
}
.checks {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}
.checks label { cursor: pointer; }
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  align-items: center;
  margin-top: 14px;
}
.primary, .secondary {
  border-radius: 7px;
  padding: 9px 14px;
  cursor: pointer;
}
.primary {
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #fff;
}
.secondary {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
}
button:disabled {
  opacity: .45;
  cursor: default;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  font-size: .9rem;
}
th, td {
  border-bottom: 1px solid #e2e8f0;
  padding: 7px;
  text-align: left;
  vertical-align: top;
}
@media (max-width: 880px) {
  main { padding: 16px; }
  .topline, .layout { display: block; }
  .facts, .option-grid, .checks { grid-template-columns: 1fr; }
}
</style>
</head>

    };
  });
  ["itemProblem", "boundaryDecision", "rerunNeeded", "diagnosticDisagrees", "exemplar"].forEach(id => {
    $(id).onchange = captureFreeText;
  });
  $("rationale").oninput = captureFreeText;
}
function reviewScreen() {
  idx = ITEMS.length;
  save();
  const rows = ITEMS.map((item, i) => {
    const response = responseFor(item);
    const done = isComplete(response);
    return `<tr>
      <td>${i + 1}</td>
      <td>${escapeHtml(item.item_id)}</td>
      <td>${escapeHtml(item.model)}</td>
      <td>${escapeHtml(item.review_priority)}</td>
      <td>${escapeHtml(response.task_success || "")}</td>
      <td>${escapeHtml(response.policy_compliance || "")}</td>
      <td>${escapeHtml(response.failure_attribution || "")}</td>
      <td>${done ? "complete" : "missing"}</td>
    </tr>`;
  }).join("");
  app.innerHTML = `<div class="topline">
      <div>
        <h1>Review</h1>
        <p class="muted">${completeCount()} of ${ITEMS.length} rows complete.</p>
      </div>
      <button class="primary" id="download">Download JSON</button>
    </div>
    <div class="actions">
      <button class="secondary" id="back">Back to last row</button>
      <button class="secondary" id="firstMissing">First missing</button>
    </div>
    <table>
      <thead><tr><th>#</th><th>Item</th><th>Model</th><th>Priority</th><th>Task</th><th>Policy</th><th>Attribution</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  $("download").onclick = download;
  $("back").onclick = () => {
    idx = Math.max(0, ITEMS.length - 1);
    save();
    itemScreen();
  };
  $("firstMissing").onclick = () => {
    const missing = ITEMS.findIndex(item => !isComplete(responseFor(item)));
    idx = missing >= 0 ? missing : 0;
    save();
    itemScreen();
  };
}
function download() {
  captureFreeText();
  const responseArray = ITEMS.map(item => {
    const response = responseFor(item);
    return {
      ...response,
      prompt: item.prompt,
      expected_behavior: item.expected_behavior,
      review_priority: item.review_priority,
      prelim_issue: item.prelim_issue
    };
  });
  const payload = {
    coder,
    set: META.set,
    run_id: META.run_id,
    generated_from: META.generated_from,
    saved_at: new Date().toISOString(),
    n_items: ITEMS.length,
    n_complete: completeCount(),
    responses: responseArray
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "adversarial_pragmatics_adjudication_" + cleanId(coder || "coder") + "_" + META.run_id + "_" + new Date().toISOString().slice(0, 10) + ".json";
  document.body.appendChild(link);
  link.click();
  link.remove();
}
startScreen();
</script>
</body>
</html>
